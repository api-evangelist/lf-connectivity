aid: lf-connectivity
name: LF Connectivity
description: >-
  LF Connectivity is a Linux Foundation umbrella initiative, launched with
  Meta, that improves access to networks through open source projects.
  Sub-projects include Magma (a next-generation packet core), Terragraph
  (gigabit wireless last-mile access), Open M-Plane (RAN configuration and
  management), Maveric (AI/ML cellular network simulations), and the ISP
  Toolbox (planning and analytics for ISP operators).
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Connectivity
  - Linux Foundation
  - Networking
  - Telecom
  - Wireless
  - 5G
  - Open Source
created: '2026-03-16'
modified: '2026-04-28'
