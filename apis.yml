  https://raw.githubusercontent.com/api-evangelist/lf-connectivity/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: lf-connectivity:magma
    name: Magma
    description: >-
      Magma is a next-generation packet core that delivers cellular network
      innovation at lower cost of ownership, with REST and gRPC APIs for
      orchestration, subscriber management, and policy enforcement.
    humanURL: https://magmacore.org/
    tags:
      - Packet Core
      - 5G
      - Cellular
      - Mobile Network
    properties:
      - type: Documentation
        url: https://magma.github.io/magma/docs/basics/introduction.html
      - type: GitHubRepo
        url: https://github.com/magma/magma
  - aid: lf-connectivity:terragraph
    name: Terragraph
    description: >-
      Terragraph is a wireless technology that enables internet service
      providers to deliver gigabit-speed last-mile access to homes,
      enterprises, and multi-dwelling buildings cost-effectively.
    humanURL: https://terragraph.com/
    tags:
      - Wireless
      - Last-Mile
      - Gigabit
      - Mesh
    properties:
      - type: Documentation
        url: https://terragraph.com/
      - type: GitHubOrg
        url: https://github.com/terragraph
  - aid: lf-connectivity:open-mplane
    name: Open M-Plane
    description: >-
      Open M-Plane is a software component of Meta's Evenstar hardware design
      for configuration and management of the Radio Access Network (RAN).
    humanURL: https://github.com/lf-connectivity/open-mplane
    tags:
      - RAN
      - Open RAN
      - Management
      - Configuration
    properties:
      - type: GitHubRepo
        url: https://github.com/lf-connectivity/open-mplane
  - aid: lf-connectivity:maveric
    name: Maveric
    description: >-
      Maveric is a platform that uses AI/ML to provide realistic cellular
      network simulations and reference examples demonstrating their use.
    humanURL: https://github.com/lf-connectivity/maveric
    tags:
      - AI
      - ML
      - Cellular Simulation
      - Network Modeling
    properties:
      - type: GitHubRepo
        url: https://github.com/lf-connectivity/maveric
  - aid: lf-connectivity:isp-toolbox
    name: ISP Toolbox
    description: >-
      ISP Toolbox empowers ISP operators with products, tools, and resources to
      better plan, analyze, and run their broadband businesses.
    humanURL: https://github.com/lf-connectivity/ISPToolbox
    tags:
      - ISP
      - Network Planning
      - Analytics
    properties:
      - type: GitHubRepo
        url: https://github.com/lf-connectivity/ISPToolbox
